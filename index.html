<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Никитин — Портфолио</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .card {
      text-align: center;
      padding: 60px 50px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 28px;
    }

    .badge {
      display: inline-block;
      background: rgba(102, 126, 234, 0.25);
      border: 1px solid rgba(102, 126, 234, 0.5);
      color: #a78bfa;
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 0.85rem;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 28px 0;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.75);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>Никитин</h1>
    <p class="subtitle">Добро пожаловать на мой сайт</p>
    <span class="badge">Portfolio — в разработке</span>
    <hr class="divider"/>
    <p>Привет! Я создаю этот сайт как своё портфолио. Скоро здесь появятся мои проекты, навыки и контакты. Следите за обновлениями!</p>
  </div>
</body>
</html>
